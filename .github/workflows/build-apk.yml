name: Build Release APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Тег релиза (например v1.0.1). По умолчанию: apk-<run_number>"
        required: false
        type: string
      release_name:
        description: "Название релиза"
        required: false
        type: string
      release_notes:
        description: "Текст исправлений (release notes). Если пусто — автогенерация GitHub"
        required: false
        type: string
      auto_generate_keystore:
        description: "Автосгенерировать временный keystore, если secrets не заданы (не для Google Play обновлений)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Prepare release keystore (optional)
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > "$GITHUB_WORKSPACE/ci-release.keystore"
          echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/ci-release.keystore" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Generate ephemeral release keystore (manual fallback)
        if: ${{ secrets.ANDROID_KEYSTORE == '' && github.event_name == 'workflow_dispatch' && github.event.inputs.auto_generate_keystore == 'true' }}
        shell: bash
        run: |
          STORE_PASS="$(openssl rand -hex 16)"
          KEY_PASS="$(openssl rand -hex 16)"
          ALIAS="release"

          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/ci-ephemeral-release.keystore" \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=CI Ephemeral, OU=Automation, O=CurseForge-mobile, L=NA, ST=NA, C=US"

          echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/ci-ephemeral-release.keystore" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=$ALIAS" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: ./gradlew -PbaseUrl="https://express-js-on-vercel-for-curseforge.vercel.app/" test

      - name: Build release APK
        run: ./gradlew -PbaseUrl="https://express-js-on-vercel-for-curseforge.vercel.app/" assembleRelease

      - name: Collect APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: release/*.apk

      - name: Resolve release metadata
        id: relmeta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          NAME="${{ github.event.inputs.release_name }}"
          NOTES="${{ github.event.inputs.release_notes }}"

          if [ -z "$TAG" ]; then TAG="apk-${{ github.run_number }}"; fi
          if [ -z "$NAME" ]; then NAME="APK Build #${{ github.run_number }}"; fi

          {
            echo "tag=$TAG"
            echo "name=$NAME"
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (manual notes)
        if: ${{ steps.relmeta.outputs.notes != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relmeta.outputs.tag }}
          name: ${{ steps.relmeta.outputs.name }}
          body: ${{ steps.relmeta.outputs.notes }}
          files: release/*.apk
          generate_release_notes: false

      - name: Create GitHub Release (auto notes)
        if: ${{ steps.relmeta.outputs.notes == '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relmeta.outputs.tag }}
          name: ${{ steps.relmeta.outputs.name }}
          files: release/*.apk
          generate_release_notes: true
