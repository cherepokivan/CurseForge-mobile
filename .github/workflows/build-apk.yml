name: Build Release APK

on:
  push:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Тег релиза (например v1.0.1). По умолчанию apk-<run_number>"
        required: false
        type: string

      release_name:
        description: "Название релиза"
        required: false
        type: string

      release_notes:
        description: "Release notes"
        required: false
        type: string

      auto_generate_keystore:
        description: "Автогенерация keystore если secrets не заданы"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x gradlew

      # -----------------------------
      # Keystore from GitHub Secrets
      # -----------------------------
      - name: Prepare release keystore (optional)
        if: env.ANDROID_KEYSTORE != ''
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > "$GITHUB_WORKSPACE/ci-release.keystore"

          echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/ci-release.keystore" >> $GITHUB_ENV
          echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV

      # -----------------------------
      # Ephemeral keystore fallback
      # -----------------------------
      - name: Generate ephemeral keystore
        if: env.ANDROID_KEYSTORE == '' && github.event_name == 'workflow_dispatch' && github.event.inputs.auto_generate_keystore == 'true'
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        shell: bash
        run: |
          STORE_PASS="$(openssl rand -hex 16)"
          KEY_PASS="$(openssl rand -hex 16)"
          ALIAS="release"

          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/ci-ephemeral.keystore" \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=CI, OU=Automation, O=App, L=NA, ST=NA, C=US"

          echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/ci-ephemeral.keystore" >> $GITHUB_ENV
          echo "RELEASE_STORE_PASSWORD=$STORE_PASS" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=$ALIAS" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=$KEY_PASS" >> $GITHUB_ENV

      # -----------------------------
      # Tests
      # -----------------------------
      - name: Run unit tests
        run: ./gradlew -PbaseUrl="https://express-js-on-vercel-for-curseforge.vercel.app/" test

      # -----------------------------
      # Build APK
      # -----------------------------
      - name: Build Release APK
        run: ./gradlew -PbaseUrl="https://express-js-on-vercel-for-curseforge.vercel.app/" assembleRelease

      # -----------------------------
      # Collect APK
      # -----------------------------
      - name: Collect APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/

      # -----------------------------
      # Upload artifact
      # -----------------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: release/*.apk

      # -----------------------------
      # Release metadata
      # -----------------------------
      - name: Resolve release metadata
        id: relmeta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          NAME="${{ github.event.inputs.release_name }}"
          NOTES="${{ github.event.inputs.release_notes }}"

          if [ -z "$TAG" ]; then
            TAG="apk-${{ github.run_number }}"
          fi

          if [ -z "$NAME" ]; then
            NAME="APK Build #${{ github.run_number }}"
          fi

          {
            echo "tag=$TAG"
            echo "name=$NAME"
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------
      # Create release with notes
      # -----------------------------
      - name: Create GitHub Release (manual notes)
        if: steps.relmeta.outputs.notes != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relmeta.outputs.tag }}
          name: ${{ steps.relmeta.outputs.name }}
          body: ${{ steps.relmeta.outputs.notes }}
          files: release/*.apk
          generate_release_notes: false

      - name: Create GitHub Release (auto notes)
        if: steps.relmeta.outputs.notes == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relmeta.outputs.tag }}
          name: ${{ steps.relmeta.outputs.name }}
          files: release/*.apk
          generate_release_notes: true
